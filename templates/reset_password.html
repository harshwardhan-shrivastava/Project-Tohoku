<!DOCTYPE html>

<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Reset Password | Project Tōhoku</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link
        rel="preconnect"
        href="https://fonts.gstatic.com"
        crossorigin
    >

    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap"
        rel="stylesheet"
    >

    <link
        rel="stylesheet"
        href="{{ url_for('static', filename='css/verify-email.css') }}"
    >

</head>


<body>

    <main class="verification-page">

        <section class="verification-card">

            <p class="verification-brand">
                PROJECT TŌHOKU
            </p>

            <h1>Create a new password</h1>

            <p class="verification-description">
                Choose a new password for your explorer account.
            </p>

            <form method="POST">

                <div class="input-group">

                    <label for="new_password">
                        New password
                    </label>

                    <input
                        type="password"
                        id="new_password"
                        name="new_password"
                        placeholder="Enter your new password"
                        required
                    >

                </div>

                <button
                    type="submit"
                    class="verification-button"
                >
                    RESET PASSWORD
                </button>

            </form>

        </section>

    </main>

</body>

</html>
